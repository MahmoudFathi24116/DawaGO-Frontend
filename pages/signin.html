<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DawaGO | تسجيل الدخول</title>
    <link rel="shortcut icon" href="../assets/fav3.png" type="image/png">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">

    <header>
        <a href="../index.html" class="logo">Dawa<span>GO</span></a>
        
        <button class="hamburger-btn" id="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>
        <div id="nav-menu" class="nav-controls">
            <button id="theme-toggle" class="icon-btn"><i class="fa-regular fa-lightbulb"></i></button>
            <a href="../index.html" class="nav-link">الرئيسية</a>
        </div>
    </header>

    <main class="container">
        <div class="form-wrapper">
            <div class="form-card">
                <div class="form-header">
                    <i class="fas fa-lock-open"></i>
                    <h2>مرحباً بك مجدداً</h2>
                    <p>سجل دخولك للوصول إلى خدماتنا</p>
                </div>
                
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="البريد الإلكتروني" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" placeholder="كلمة المرور" required>
                    </div>

                    <div class="form-options">
                        <a href="#">نسيت كلمة المرور؟</a>
                    </div>

                    <button type="submit" class="btn-small btn-full">دخول</button>
                </form>

                <div class="form-footer">
                    <p>ليس لديك حساب؟ <a href="../pages/signup.html">أنشئ حساباً الآن</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="../scripts/signin.js"></script>
</body>
</html>
